name: Build RogueBot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Release]

    env:
      Solution_Name: RogueBot.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Install .NET 10 (preview required)
    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        include-prerelease: true

    # Restore
    - name: Restore
      run: dotnet restore $env:Solution_Name

    # Build
    - name: Build
      run: dotnet build $env:Solution_Name --configuration $env:Configuration --no-restore
      env:
        Configuration: ${{ matrix.configuration }}

    # Publish
    - name: Publish
      run: dotnet publish $env:Solution_Name --configuration $env:Configuration --output ./publish
      env:
        Configuration: ${{ matrix.configuration }}
